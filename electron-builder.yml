appId: com.cullexa-picture-organizer.app
productName: Cullexa Picture Organizer
directories:
  buildResources: resources
  output: dist
win:
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  runAfterFinish: true
asarUnpack:
  - "**/node_modules/sql.js/**/*"
  - "**/node_modules/sharp/**/*"
