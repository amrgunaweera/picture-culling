appId: com.cullexa-picture-organizer.app
productName: Cullexa Picture Organizer
directories:
  buildResources: resources
  output: dist
win:
  target:
    - msi
  icon: resources/icon.ico
msi:
  oneClick: false
  perMachine: true
  runAfterFinish: true
asarUnpack:
  - "**/node_modules/sql.js/**/*"
  - "**/node_modules/sharp/**/*"
